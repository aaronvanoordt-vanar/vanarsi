<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/content.js?v=12"></script>
<script src="src/content-extra.js?v=10"></script>
<script type="text/babel" src="src/interactive.jsx?v=14"></script>
<script type="text/babel" src="src/globe.jsx?v=8"></script>
<script type="text/babel" src="src/app.jsx?v=12"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const saved = typeof localStorage !== 'undefined' ? localStorage.getItem('vanar_lang') : null;
    const [lang, setLang] = useState(saved || 'es');
    useEffect(() => {
      if (typeof localStorage !== 'undefined') localStorage.setItem('vanar_lang', lang);
      document.documentElement.lang = lang;
    }, [lang]);

    // Reveal on scroll
    useEffect(() => {
      const els = document.querySelectorAll('.reveal');
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
      }, { threshold: 0.12 });
      els.forEach(el => io.observe(el));
      return () => io.disconnect();
    }, [lang]);

    const t = window.VANAR_COPY[lang];
    return (
      <React.Fragment>
        <Nav t={t} lang={lang} setLang={setLang} />
        <Hero t={t} lang={lang} />
        <ClientMarquee t={t} lang={lang} />
        <Pillars t={t} lang={lang} />
        <Stats t={t} />
        <Problem t={t} lang={lang} />
        <PainSolution lang={lang} />
        <How t={t} lang={lang} />
        <Diff t={t} lang={lang} />
        <ROICalc lang={lang} />
        <Proof t={t} lang={lang} />
        <Contact t={t} lang={lang} />
        <Footer t={t} lang={lang} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
