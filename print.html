<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vanar · Soluciones Integrales Corporativas — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="src/styles.css?v=3" />
<link rel="stylesheet" href="src/styles-interactive.css?v=5" />
<link rel="stylesheet" href="src/styles-globe.css?v=5" />
<link rel="stylesheet" href="src/styles-how.css?v=1" />
<link rel="stylesheet" href="src/styles-print.css?v=1" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/content.js?v=12"></script>
<script src="src/content-extra.js?v=10"></script>
<script type="text/babel" src="src/interactive.jsx?v=14"></script>
<script type="text/babel" src="src/globe.jsx?v=8"></script>
<script type="text/babel" src="src/app.jsx?v=11"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  function App() {
    const [lang] = useState('es'); // print only in Spanish

    // No scroll-reveal in print — force all .reveal visible
    useEffect(() => {
      document.querySelectorAll('.reveal').forEach(el => el.classList.add('in'));
    }, []);

    const t = window.VANAR_COPY[lang];
    return (
      <React.Fragment>
        <Hero t={t} lang={lang} />
        <Pillars t={t} lang={lang} />
        <Stats t={t} />
        <Problem t={t} lang={lang} />
        <PainSolution lang={lang} />
        <How t={t} lang={lang} />
        <Diff t={t} lang={lang} />
        <Proof t={t} lang={lang} />
        <Contact t={t} lang={lang} />
        <Footer t={t} lang={lang} />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  // Auto-print after everything is ready
  (async () => {
    // Wait for fonts
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    // Wait for images to load
    const imgs = Array.from(document.images || []);
    await Promise.all(imgs.map(img =>
      img.complete ? Promise.resolve() :
      new Promise(res => { img.onload = img.onerror = res; })
    ));
    // Safety buffer for React + Babel to finish rendering + layout settle
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
